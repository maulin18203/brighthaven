{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="glass-card auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/pr1.png') }}" alt="BrightHaven Logo">
            <h1>Reset Password</h1>
            <p>Enter your email to receive reset instructions</p>
        </div>

        {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ cat }}" data-auto-dismiss>
            <i class="bi bi-{% if cat=='success' %}check-circle{% elif cat=='danger' %}x-circle{% else %}info-circle{% endif %}"></i>
            {{ msg }}
        </div>
        {% endfor %}

        <form id="resetForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="your@email.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" id="resetBtn">
                <i class="bi bi-envelope"></i> <span>Send Reset Link</span>
            </button>
        </form>

        <div class="auth-links" style="margin-top:24px">
            Remember your password? <a href="{{ url_for('home.login') }}">Sign in</a>
        </div>
    </div>
</div>

<!-- Firebase App (the core Firebase SDK) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<!-- Firebase Auth -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDT_Qw-ew6sW47fLrPMInTwwwSLHBvLPao",
      authDomain: "brighthaven-93fc1.firebaseapp.com",
      projectId: "brighthaven-93fc1",
      storageBucket: "brighthaven-93fc1.firebasestorage.app",
      messagingSenderId: "588035080074",
      appId: "1:588035080074:web:3e30b31dab428297fa1273"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const resetForm = document.getElementById('resetForm');
    const resetBtn = document.getElementById('resetBtn');

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const originalText = resetBtn.innerHTML;
        resetBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> <span>Sending...</span>';
        resetBtn.disabled = true;

        try {
            await auth.sendPasswordResetEmail(email);
            alert("Password reset email sent! Check your inbox.");
            window.location.href = "{{ url_for('home.login') }}";
        } catch (error) {
            console.error(error);
            alert("Failed to send reset email: " + error.message);
            resetBtn.innerHTML = originalText;
            resetBtn.disabled = false;
        }
    });
</script>
{% endblock %}
